<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="550" cy="302" r="71" fill="#1d4ed8" opacity="0.14"/>
    <circle cx="129" cy="-90" r="50" fill="#1d4ed8" opacity="0.18"/>
    <circle cx="789" cy="-65" r="74" fill="#1d4ed8" opacity="0.19"/>
    <circle cx="927" cy="248" r="41" fill="#1d4ed8" opacity="0.18"/>
    <circle cx="637" cy="442" r="59" fill="#1d4ed8" opacity="0.05"/>
    <circle cx="22" cy="489" r="37" fill="#1d4ed8" opacity="0.12"/>
    <rect x="312" y="145" width="85" height="89" rx="8" fill="#2563eb" opacity="0.14" transform="rotate(35, 427, 638)"/>
    <rect x="457" y="697" width="94" height="91" rx="8" fill="#2563eb" opacity="0.06" transform="rotate(14, 547, 46)"/>
    <rect x="1107" y="384" width="88" height="74" rx="8" fill="#2563eb" opacity="0.12" transform="rotate(21, 1261, 123)"/>
    <rect x="418" y="458" width="74" height="55" rx="8" fill="#2563eb" opacity="0.12" transform="rotate(22, 294, 18)"/>
    <rect x="1191" y="-73" width="77" height="64" rx="8" fill="#2563eb" opacity="0.04" transform="rotate(4, 5, 650)"/>
    <rect x="1052" y="347" width="93" height="62" rx="8" fill="#2563eb" opacity="0.04" transform="rotate(12, 1291, 177)"/>
    <rect x="1216" y="-28" width="83" height="51" rx="8" fill="#2563eb" opacity="0.15" transform="rotate(0, 137, 646)"/>
    <rect x="372" y="285" width="75" height="70" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(13, 988, 605)"/>
    <polygon points="757,42 778,84 736,84" fill="#1d4ed8" opacity="0.05"/>
    <polygon points="211,580 249,656 173,656" fill="#1d4ed8" opacity="0.07"/>
    <polygon points="611,690 649,766 573,766" fill="#1d4ed8" opacity="0.11"/>
    <polygon points="208,50 229,92 187,92" fill="#1d4ed8" opacity="0.07"/>

  <!-- Wave at bottom -->
  <path d="M0,544 C360,587 840,501 1200,544 L1200,630 L0,630Z" fill="#1d4ed8" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    4-에이전트 루프 자동화 프로그램 코딩 스쿨
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 무인 마케팅 스쿨
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f59e0b" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     4-에이전트 루프 자동화 프로그램 코딩 스쿨 — 무인 마케팅 스쿨
  </text>
</svg>